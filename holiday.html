<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026-2027 KLN Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --apple-blue: #007aff;
            --apple-gray: #8e8e93;
            --apple-bg: #f2f2f7;
            --apple-red: #ff3b30;
            --grid-border: #efeff4;
            /* Region Colors */
            --color-on: #34c759;
            --color-bc: #007aff;
            --color-qc: #af52de;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: white;
            color: black;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        .view-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-view { display: none; opacity: 0; transform: scale(0.96); }
        .active-view { display: block; opacity: 1; transform: scale(1); }

        .calendar-grid-header {
            display: grid;
            grid-template-columns: 36px repeat(7, 1fr);
            text-align: center;
        }

        .month-detail-grid {
            display: grid;
            grid-template-columns: 36px repeat(7, 1fr);
            border-left: 1px solid var(--grid-border);
            border-top: 1px solid var(--grid-border);
        }

        .week-num, .day-cell {
            border-right: 1px solid var(--grid-border);
            border-bottom: 1px solid var(--grid-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1/1;
            position: relative;
        }

        .week-num {
            font-size: 0.6rem;
            color: var(--apple-gray);
            background-color: #fafafa;
            font-weight: 500;
        }

        .day-cell {
            font-size: 1rem;
            cursor: default;
            z-index: 1;
        }

        .day-number { position: relative; z-index: 2; pointer-events: none; }

        .is-today .day-number { color: white !important; font-weight: bold; }
        .is-today::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 75%; height: 75%;
            background-color: var(--apple-red);
            border-radius: 50%;
            z-index: 1;
        }

        .weekend { color: var(--apple-red); }

        .holiday-dots {
            display: flex;
            gap: 2px;
            margin-top: 2px;
            position: absolute;
            bottom: 4px;
            pointer-events: none;
        }
        .dot { width: 4px; height: 4px; border-radius: 50%; }
        .dot-on { background-color: var(--color-on); }
        .dot-bc { background-color: var(--color-bc); }
        .dot-qc { background-color: var(--color-qc); }

        .month-card {
            transition: transform 0.2s ease;
            cursor: pointer;
            border-radius: 12px;
            border: 1px solid transparent;
        }
        .month-card:hover { border-color: var(--grid-border); background-color: #fafafa; }
        .month-card:active { transform: scale(0.95); background-color: #f2f2f7; }

        .detail-container {
            display: grid;
            grid-template-columns: 120px 1fr 120px;
            gap: 1.5rem;
            align-items: start;
        }

        .side-thumb { cursor: pointer; opacity: 0.4; transition: opacity 0.2s; margin-top: 8rem; }
        .side-thumb:hover { opacity: 1; }

        .lang-btn {
            padding: 4px 6px; font-size: 11px; border-radius: 6px; border: 1px solid #eee;
            cursor: pointer; background: white; font-weight: 600;
        }
        .lang-btn.active { background-color: var(--apple-blue); color: white; border-color: var(--apple-blue); }

        /* Region Selection Buttons */
        .region-btn {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid #eee;
            background: #f8f8f8;
        }
        .region-btn:active { transform: scale(0.95); }
        .btn-on { color: var(--color-on); }
        .btn-bc { color: var(--color-bc); }
        .btn-qc { color: var(--color-qc); }

        /* Popover Styling */
        #holiday-popover {
            position: absolute;
            z-index: 100;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 10px 14px;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.1);
            font-size: 12px;
            font-weight: 600;
            color: #1a1a1a;
            pointer-events: none;
            display: none;
            white-space: nowrap;
            text-align: center;
            transform: translateY(-5px);
        }
        #holiday-popover::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0 6px;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        /* Modal Styling */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: modalPop 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.28);
        }
        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 850px) {
            .detail-container { grid-template-columns: 1fr; }
            .side-thumb { display: none; }
            .day-cell { font-size: 0.95rem; }
        }
    </style>
</head>
<body class="bg-white min-h-screen">

    <div id="holiday-popover"></div>

    <!-- 假期列表模态框 -->
    <div id="holiday-modal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-bold">Holidays</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-black">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="modal-body" class="p-6 max-h-[60vh] overflow-y-auto">
                <!-- 列表动态插入 -->
            </div>
            <div class="p-6 bg-gray-50 border-t border-gray-100">
                <button id="add-to-calendar-btn" onclick="exportToICS()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-6 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span id="add-calendar-text">Add to Calendar</span>
                </button>
            </div>
        </div>
    </div>

    <header class="sticky top-0 bg-white/90 backdrop-blur-md z-30 border-b border-gray-100 shadow-sm">
        <div class="header-content max-w-6xl mx-auto h-16 flex items-center justify-between px-4">
            <div class="flex items-center gap-2">
                <div id="back-btn" class="text-blue-500 font-medium cursor-pointer flex items-center invisible transition-opacity">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                    <span id="back-text" class="text-lg">2026</span>
                </div>
            </div>
            
            <h1 id="main-title" class="text-xl font-bold absolute left-1/2 -translate-x-1/2 text-gray-800">2026</h1>
            
            <div class="flex gap-1">
                <button onclick="setLang('en')" id="btn-en" class="lang-btn">EN</button>
                <button onclick="setLang('fr')" id="btn-fr" class="lang-btn">FR</button>
                <button onclick="setLang('zh')" id="btn-zh" class="lang-btn">ZH</button>
            </div>
        </div>
    </header>

    <main id="year-view" class="p-4 active-view view-transition max-w-6xl mx-auto text-center">
        <!-- 省份快捷按钮 -->
        <div id="region-selector" class="flex justify-center gap-4 mb-10 mt-2">
            <button onclick="openHolidayModal('QC')" class="region-btn btn-qc">QC</button>
            <button onclick="openHolidayModal('ON')" class="region-btn btn-on">ON</button>
            <button onclick="openHolidayModal('BC')" class="region-btn btn-bc">BC</button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-10" id="year-grid"></div>
    </main>

    <main id="month-view" class="p-2 sm:p-4 hidden-view view-transition max-w-6xl mx-auto">
        <div class="detail-container">
            <div id="prev-thumb" class="side-thumb"></div>
            
            <div class="flex flex-col bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                <h2 id="current-month-name" class="text-2xl sm:text-4xl font-black py-8 text-center text-gray-900 tracking-tight">January</h2>
                
                <div id="day-labels" class="calendar-grid-header border-b border-gray-100 bg-gray-50 py-3"></div>
                
                <div id="month-detail-grid" class="month-detail-grid"></div>
                
                <div class="p-6 bg-gray-50/50 border-t border-gray-100">
                    <div id="holiday-info" class="flex flex-col gap-y-2"></div>
                </div>
            </div>

            <div id="next-thumb" class="side-thumb"></div>
        </div>
    </main>

    <script>
        const translations = {
            en: {
                months: ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December", "January 2027"],
                days: ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"],
                daysShort: ["S", "M", "T", "W", "T", "F", "S"],
                weekPrefix: "W",
                regions: { ON: "ON", BC: "BC", QC: "QC" },
                observed: "(Observed)",
                addCalendar: "Add to Calendar",
                holidayTitle: " Holidays"
            },
            fr: {
                months: ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre", "Janvier 2027"],
                days: ["DIM", "LUN", "MAR", "MER", "JEU", "VEN", "SAM"],
                daysShort: ["D", "L", "M", "M", "J", "V", "S"],
                weekPrefix: "S",
                regions: { ON: "ON", BC: "CB", QC: "QC" },
                observed: "(Observé)",
                addCalendar: "Ajouter au calendrier",
                holidayTitle: " Vacances"
            },
            zh: {
                months: ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月", "2027年一月"],
                days: ["日", "一", "二", "三", "四", "五", "六"],
                daysShort: ["日", "一", "二", "三", "四", "五", "六"],
                weekPrefix: "周",
                regions: { ON: "安省", BC: "卑诗", QC: "魁省" },
                observed: "(补假)",
                addCalendar: "添加到日历",
                holidayTitle: "假期清单"
            }
        };

        const baseHolidays = [
            { date: '2026-01-01', regions: ['ON', 'BC', 'QC'], name: { en: "New Year's Day", fr: "Jour de l'An", zh: "元旦" } },
            { date: '2026-02-16', regions: ['ON', 'BC'], name: { en: "Family Day", fr: "Jour de la famille", zh: "家庭日" } },
            { date: '2026-04-03', regions: ['ON', 'BC', 'QC'], name: { en: "Good Friday", fr: "Vendredi saint", zh: "耶稣受难日" } },
            { date: '2026-05-18', regions: ['ON', 'BC', 'QC'], name: { en: "Victoria Day", fr: "Fête de la Reine", zh: "维多利亚日" } },
            { date: '2026-06-24', regions: ['QC'], name: { en: "St. Jean Baptiste Day", fr: "Fête nationale", zh: "圣让-巴蒂斯特节" } },
            { date: '2026-07-01', regions: ['ON', 'BC', 'QC'], name: { en: "Canada Day", fr: "Fête du Canada", zh: "加拿大日" } },
            { date: '2026-08-03', regions: ['BC'], name: { en: "BC Day", fr: "Fête de la CB", zh: "卑诗省日" } },
            { date: '2026-08-03', regions: ['ON'], name: { en: "Civic Holiday", fr: "Congé civique", zh: "公民日" } },
            { date: '2026-09-07', regions: ['ON', 'BC', 'QC'], name: { en: "Labour Day", fr: "Fête du Travail", zh: "劳动节" } },
            { date: '2026-10-12', regions: ['ON', 'BC', 'QC'], name: { en: "Thanksgiving", fr: "Action de grâce", zh: "感恩节" } },
            { date: '2026-12-25', regions: ['ON', 'BC', 'QC'], name: { en: "Christmas Day", fr: "Jour de Noël", zh: "圣诞节" } },
            { date: '2026-12-26', regions: ['ON', 'BC', 'QC'], name: { en: "Boxing Day", fr: "Lendemain de Noël", zh: "节礼日" } },
            { date: '2027-01-01', regions: ['ON', 'BC', 'QC'], name: { en: "New Year's Day", fr: "Jour de l'An", zh: "元旦" } }
        ];

        const holidays = [];
        baseHolidays.forEach(h => {
            holidays.push(h);
            const d = new Date(h.date.replace(/-/g, '/'));
            const dayOfWeek = d.getDay(); 
            if (dayOfWeek === 0 || dayOfWeek === 6) {
                const obsDate = new Date(d);
                obsDate.setDate(d.getDate() + (dayOfWeek === 0 ? 1 : 2));
                holidays.push({
                    date: obsDate.toISOString().split('T')[0],
                    regions: h.regions,
                    isObserved: true,
                    name: {
                        en: `${h.name.en} ${translations.en.observed}`,
                        fr: `${h.name.fr} ${translations.fr.observed}`,
                        zh: `${h.name.zh} ${translations.zh.observed}`
                    }
                });
            }
        });

        let currentLang = 'en';
        let currentFocusedMonth = 0;
        let isMonthView = false;
        let selectedRegion = 'QC';
        let activePopoverDay = null;
        const popover = document.getElementById('holiday-popover');

        function detectLanguage() {
            const navLang = navigator.language.toLowerCase();
            if (navLang.startsWith('zh')) return 'zh';
            if (navLang.startsWith('fr')) return 'fr';
            return 'en';
        }

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${lang}`).classList.add('active');
            document.getElementById('add-calendar-text').innerText = translations[currentLang].addCalendar;
            hidePopover();
            if (isMonthView) renderMonthDetail(currentFocusedMonth);
            else initYearView();
        }

        function getSequentialWeekNumber(d) {
            const startOfYear = new Date(2026, 0, 1);
            const diff = Math.floor((d - startOfYear) / (1000 * 60 * 60 * 24));
            return Math.floor((diff + startOfYear.getDay()) / 7) + 1;
        }

        function hidePopover() { 
            popover.style.display = 'none'; 
            activePopoverDay = null;
        }

        window.addEventListener('click', (e) => {
            if (!e.target.closest('.day-cell')) hidePopover();
        });

        function showHolidayTooltip(e, holidayNames, dateKey) {
            e.stopPropagation();
            if (activePopoverDay === dateKey) {
                hidePopover();
                return;
            }
            activePopoverDay = dateKey;
            const cell = e.currentTarget;
            popover.innerText = holidayNames.join(' / ');
            popover.style.visibility = 'hidden';
            popover.style.display = 'block';
            const rect = cell.getBoundingClientRect();
            const popWidth = popover.offsetWidth;
            const popHeight = popover.offsetHeight;
            const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            let leftPos = rect.left + scrollLeft + rect.width / 2 - popWidth / 2;
            let topPos = rect.top + scrollTop - popHeight - 12;
            if (leftPos < 10) leftPos = 10;
            if (leftPos + popWidth > window.innerWidth - 10) leftPos = window.innerWidth - popWidth - 10;
            popover.style.left = `${leftPos}px`;
            popover.style.top = `${topPos}px`;
            popover.style.visibility = 'visible';
        }

        function initYearView() {
            const yearGrid = document.getElementById('year-grid');
            const langData = translations[currentLang];
            yearGrid.innerHTML = '';
            document.getElementById('main-title').innerText = '2026';
            document.getElementById('back-btn').classList.add('invisible');

            for(let index=0; index < 13; index++) {
                const is2027 = index === 12;
                const mYear = is2027 ? 2027 : 2026;
                const mIdx = is2027 ? 0 : index;
                const name = langData.months[index];

                const card = document.createElement('div');
                card.className = 'month-card p-4 bg-white shadow-sm hover:shadow-md transition-shadow';
                card.onclick = () => showMonth(index);

                const title = document.createElement('h3');
                title.className = 'text-red-500 font-bold text-lg mb-4';
                title.innerText = name;
                card.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-7 text-[11px] text-center gap-y-2';
                langData.daysShort.forEach(d => {
                    const dLabel = document.createElement('div');
                    dLabel.className = 'text-gray-300 font-bold';
                    dLabel.innerText = d;
                    grid.appendChild(dLabel);
                });
                const firstDay = new Date(mYear, mIdx, 1).getDay();
                const daysInMonth = new Date(mYear, mIdx + 1, 0).getDate();
                for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
                for (let d = 1; d <= daysInMonth; d++) {
                    const date = new Date(mYear, mIdx, d);
                    const isToday = new Date().toDateString() === date.toDateString();
                    const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                    const dayDiv = document.createElement('div');
                    dayDiv.className = "flex items-center justify-center h-5 w-5 mx-auto relative ";
                    if (isToday) dayDiv.className += "bg-red-500 text-white rounded-full font-bold";
                    else if (isWeekend) dayDiv.className += "text-red-500";
                    else dayDiv.className += "text-gray-800";
                    dayDiv.innerText = d;
                    grid.appendChild(dayDiv);
                }
                card.appendChild(grid);
                yearGrid.appendChild(card);
            }
        }

        function renderThumbnail(index, container) {
            if (index < 0 || index > 12) { container.innerHTML = ''; return; }
            const is2027 = index === 12;
            const mYear = is2027 ? 2027 : 2026;
            const mIdx = is2027 ? 0 : index;
            const langData = translations[currentLang];
            const name = langData.months[index];
            const firstDay = new Date(mYear, mIdx, 1).getDay();
            const daysInMonth = new Date(mYear, mIdx + 1, 0).getDate();
            container.innerHTML = '';
            const thumb = document.createElement('div');
            thumb.className = 'bg-white p-4 rounded-2xl border border-gray-100 shadow-lg transform hover:scale-105 transition-transform';
            thumb.onclick = () => showMonth(index);
            const title = document.createElement('div');
            title.className = 'text-[11px] font-black text-red-500 mb-3 uppercase tracking-wider text-center';
            title.innerText = name;
            thumb.appendChild(title);
            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-7 gap-1 text-[8px] text-center text-gray-400';
            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(mYear, mIdx, d);
                const dayDiv = document.createElement('div');
                if (date.getDay()===0||date.getDay()===6) dayDiv.className = 'text-red-400';
                dayDiv.innerText = d;
                grid.appendChild(dayDiv);
            }
            thumb.appendChild(grid);
            container.appendChild(thumb);
        }

        function renderMonthDetail(index) {
            currentFocusedMonth = index;
            const is2027 = index === 12;
            const mYear = is2027 ? 2027 : 2026;
            const mIdx = is2027 ? 0 : index;
            const langData = translations[currentLang];
            document.getElementById('current-month-name').innerText = langData.months[index];
            document.getElementById('main-title').innerText = langData.months[index];
            document.getElementById('back-text').innerText = is2027 ? '2027' : '2026';
            document.getElementById('back-btn').classList.remove('invisible');
            const dayLabels = document.getElementById('day-labels');
            dayLabels.innerHTML = '';
            const blankHeader = document.createElement('div');
            blankHeader.className = 'text-gray-300 text-[9px] flex items-center justify-center font-bold';
            blankHeader.innerText = '#';
            dayLabels.appendChild(blankHeader);
            langData.days.forEach((d, idx) => {
                const label = document.createElement('div');
                label.className = `${idx===0||idx===6 ? 'text-red-500':'text-gray-400'} text-[10px] font-black`;
                label.innerText = d;
                dayLabels.appendChild(label);
            });
            renderThumbnail(index - 1, document.getElementById('prev-thumb'));
            renderThumbnail(index + 1, document.getElementById('next-thumb'));
            const detailGrid = document.getElementById('month-detail-grid');
            detailGrid.innerHTML = ''; 
            const daysInMonth = new Date(mYear, mIdx + 1, 0).getDate();
            const firstDay = new Date(mYear, mIdx, 1).getDay();
            const rows = Math.ceil((firstDay + daysInMonth) / 7);
            const monthHolidays = [];
            let dayCounter = 1;
            for (let r = 0; r < rows; r++) {
                const rowStartDate = new Date(mYear, mIdx, dayCounter - (r === 0 ? firstDay : 0));
                const weekNum = getSequentialWeekNumber(rowStartDate);
                const weekCell = document.createElement('div');
                weekCell.className = 'week-num';
                weekCell.innerText = `${langData.weekPrefix}${weekNum}`;
                detailGrid.appendChild(weekCell);
                for (let d = 0; d < 7; d++) {
                    const cellIdx = r * 7 + d;
                    const cell = document.createElement('div');
                    cell.className = 'day-cell';
                    if (cellIdx >= firstDay && dayCounter <= daysInMonth) {
                        const dateStr = `${mYear}-${String(mIdx + 1).padStart(2, '0')}-${String(dayCounter).padStart(2, '0')}`;
                        const date = new Date(mYear, mIdx, dayCounter);
                        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                        const isToday = new Date().toDateString() === date.toDateString();
                        const dayHols = holidays.filter(h => h.date === dateStr);
                        const numSpan = document.createElement('span');
                        numSpan.className = 'day-number';
                        numSpan.innerText = dayCounter;
                        cell.appendChild(numSpan);
                        if (isToday) cell.classList.add('is-today');
                        else if (isWeekend) cell.classList.add('weekend');
                        if (dayHols.length > 0) {
                            const dotContainer = document.createElement('div');
                            dotContainer.className = 'holiday-dots';
                            const names = [];
                            dayHols.forEach(h => {
                                names.push(h.name[currentLang]);
                                h.regions.forEach(reg => {
                                    const dot = document.createElement('div');
                                    dot.className = `dot dot-${reg.toLowerCase()}`;
                                    dotContainer.appendChild(dot);
                                });
                                monthHolidays.push(h);
                            });
                            cell.appendChild(dotContainer);
                            const capturedNames = [...names];
                            const capturedDateKey = dateStr;
                            cell.onclick = (e) => showHolidayTooltip(e, capturedNames, capturedDateKey);
                            cell.style.cursor = 'pointer';
                        }
                        dayCounter++;
                    }
                    detailGrid.appendChild(cell);
                }
            }
            const infoArea = document.getElementById('holiday-info');
            infoArea.innerHTML = '';
            monthHolidays.sort((a,b) => a.date.localeCompare(b.date)).forEach(h => {
                const item = document.createElement('div');
                item.className = 'flex items-center gap-2 text-[11px] mb-1';
                const day = h.date.split('-')[2];
                const regionTags = h.regions.map(r => `<span class="px-1 py-0.5 rounded text-[8px] font-bold text-white" style="background-color:var(--color-${r.toLowerCase()})">${translations[currentLang].regions[r] || r}</span>`).join('');
                item.innerHTML = `<strong>${day}:</strong> <span class="${h.isObserved ? 'text-gray-400 italic' : 'text-gray-700'}">${h.name[currentLang]}</span> ${regionTags}`;
                infoArea.appendChild(item);
            });
            if (monthHolidays.length === 0) infoArea.innerHTML = `<span class="text-gray-400 text-xs italic">No holidays.</span>`;
        }

        function showMonth(index) {
            isMonthView = true;
            renderMonthDetail(index);
            document.getElementById('back-btn').classList.remove('invisible');
            document.getElementById('year-view').classList.replace('active-view', 'hidden-view');
            setTimeout(() => {
                document.getElementById('year-view').style.display = 'none';
                document.getElementById('month-view').style.display = 'block';
                setTimeout(() => document.getElementById('month-view').classList.replace('hidden-view', 'active-view'), 50);
            }, 400);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showYear() {
            isMonthView = false;
            hidePopover();
            document.getElementById('back-btn').classList.add('invisible');
            document.getElementById('main-title').innerText = '2026';
            document.getElementById('month-view').classList.replace('active-view', 'hidden-view');
            setTimeout(() => {
                document.getElementById('month-view').style.display = 'none';
                document.getElementById('year-view').style.display = 'block';
                setTimeout(() => document.getElementById('year-view').classList.replace('hidden-view', 'active-view'), 50);
            }, 400);
        }

        // --- Holiday Modal & Export Logic ---

        function openHolidayModal(region) {
            selectedRegion = region;
            const modal = document.getElementById('holiday-modal');
            const modalTitle = document.getElementById('modal-title');
            const modalBody = document.getElementById('modal-body');
            const langData = translations[currentLang];

            modalTitle.innerText = region + langData.holidayTitle;
            modalBody.innerHTML = '';

            const filteredHolidays = holidays.filter(h => h.regions.includes(region));
            filteredHolidays.sort((a,b) => a.date.localeCompare(b.date)).forEach(h => {
                const div = document.createElement('div');
                div.className = 'flex justify-between py-3 border-b border-gray-50 items-center';
                div.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-sm font-bold text-gray-800">${h.name[currentLang]}</span>
                        <span class="text-xs text-gray-400">${h.date}</span>
                    </div>
                    <span class="text-[10px] font-black px-2 py-1 bg-gray-100 rounded text-gray-500">${h.isObserved ? 'OBS' : 'REG'}</span>
                `;
                modalBody.appendChild(div);
            });

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('holiday-modal').style.display = 'none';
        }

        function exportToICS() {
            const filteredHolidays = holidays.filter(h => h.regions.includes(selectedRegion));
            let icsContent = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//KLN Calendar//EN\n";

            filteredHolidays.forEach(h => {
                const dateClean = h.date.replace(/-/g, '');
                icsContent += "BEGIN:VEVENT\n";
                icsContent += `DTSTART;VALUE=DATE:${dateClean}\n`;
                icsContent += `SUMMARY:${h.name[currentLang]}\n`;
                icsContent += "END:VEVENT\n";
            });

            icsContent += "END:VCALENDAR";

            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute('download', `${selectedRegion}_2026_Holidays.ics`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        document.getElementById('back-btn').onclick = showYear;
        window.onload = () => {
            setLang(detectLanguage());
            initYearView();
        };
    </script>
</body>
</html>
